---
name: 'Lint'
on:
  pull_request: {}
  push:
    branches:
      - 'master'
jobs:
  ansible-lint:
    name: 'Ansible Lint'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'

      # Pinned to v26.1.1 as v26.2.0 switched the action to install `ansible-lint` in an isolated `uv` virtualenv whose
      # `bin/` is never added to `$PATH`, so the `requirements_file` step's `ansible-galaxy` resolves to the runner's
      # preinstalled ansible instead and never installs our pinned collection where lint searches. See ansible/ansible-lint#5034.
      - name: 'Run ansible-lint'
        uses: 'ansible/ansible-lint@v26.1.1'
        with:
          args: '--strict'
          requirements_file: 'requirements.yaml'
          working_directory: 'ansible'

  render:
    name: 'Render (personal=${{ matrix.personal }}, work=${{ matrix.work }})'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        personal:
          - false
          - true
        work:
          - false

    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'
      - name: 'Setup Chezmoi'
        uses: './.github/actions/chezmoi'

      - name: 'Initialize Chezmoi'
        run: 'chezmoi init --promptBool "Enable personal profile=${{ matrix.personal }},Enable work profile=${{ matrix.work }}" .'
      - name: 'Render Chezmoi templates'
        run: |
          mkdir .home
          chezmoi archive --exclude externals --format tar | tar --extract --directory .home
      - name: 'Upload rendered templates'
        uses: 'actions/upload-artifact@v7.0.1'
        with:
          name: 'personal=${{ matrix.personal }},work=${{ matrix.work }}'
          path: '.home'
          if-no-files-found: 'error'
          include-hidden-files: true

  shellcheck:
    name: 'ShellCheck'
    needs: 'render'
    if: '${{ always() }}'
    runs-on: 'ubuntu-latest'
    outputs:
      files: '${{ steps.shellcheck.outputs.files }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'
      - name: 'Download rendered templates'
        uses: 'actions/download-artifact@v8.0.1'
        with:
          path: '.home'

      - id: 'shellcheck'
        name: 'Run ShellCheck'
        uses: 'ludeeus/action-shellcheck@2.0.0'

  shfmt:
    needs:
      - 'render'
      - 'shellcheck'
    if: '${{ always() }}'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'
      - name: 'Download rendered templates'
        uses: 'actions/download-artifact@v8.0.1'
        with:
          path: '.home'

      - name: 'Setup shfmt'
        uses: 'mfinelli/setup-shfmt@v4.0.1'
      - name: 'Run shfmt'
        run: 'shfmt --diff --indent=2 ${{ needs.shellcheck.outputs.files }}'

  yamllint:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'
      - name: 'Run yamllint'
        uses: 'ibiqlik/action-yamllint@v3.1.1'
